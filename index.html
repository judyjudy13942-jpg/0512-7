<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 小精靈 & 西瓜 記帳本 💕</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: sans-serif; background: #ffe3ef; padding: 20px; color: #6d2942; text-align: center; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #f3a9c6; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 15px; background: #ff6fa9; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        .record-item { background: #fff2f8; border-radius: 15px; padding: 15px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px; color: white; font-weight: bold; margin-right: 4px; }
        .tag-elf { background: #ff6fa9; }
        .tag-water { background: #4da6ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>💕 新增支出 💕</h2>
        <select id="payer"><option value="小精靈">小精靈</option><option value="西瓜">西瓜</option></select>
        <input id="title" placeholder="項目">
        <input id="amount" type="number" placeholder="金額">
        <select id="category">
            <option value="餐飲">🍔 餐飲</option>
            <option value="交通">🚗 交通</option>
            <option value="購物">🛍️ 購物</option>
            <option value="住宿">🏠 住宿</option>
            <option value="狗勾">🐶 狗勾</option>
            <option value="醫療">🏥 醫療</option> 
            <option value="儲值">💰 儲值</option> 
            <option value="罰款">🚔 罰款</option>
            <option value="其他">✨ 其他</option>
        </select>
        <select id="need_type">
            <option value="必要花費">⚠️ 必要花費</option>
            <option value="想要花費">🎁 想要花費</option>
        </select>
        <button id="addBtn">確認新增</button>
    </div>
    <div class="card">
        <div id="stats-board" style="margin-bottom: 15px;"></div>
        <h3>📊 支出紀錄</h3>
        <div id="list">正在同步資料...</div>
    </div>
</div>

<script>
    // --- 配置資訊 ---
    const SB_URL = "https://dfflacypaegfmgstwzeb.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZmxhY3lwYWVnZm1nc3R3emViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mzk3NjksImV4cCI6MjA5NDExNTc2OX0.RsC760Xyq1bTN6zq9Itm3rDoRLqbVgglj6EegkA5gmQ";
    
    let client = null;

    // --- 安全初始化連線 ---
    function getClient() {
        if (client) return client; // 如果已經連好了就直接用
        
        // 檢查全域變數是否存在 (避免 TypeError)
        if (window.supabase && window.supabase.createClient) {
            client = window.supabase.createClient(SB_URL, SB_KEY);
            return client;
            showStatistics();
        }
        return null;
    }

    // 計算本月與上月範圍
    function getDateRanges() {
        const now = new Date();
        const startThis = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
        const startLast = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();
        const endLast = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59).toISOString();
        return { startThis, startLast, endLast };
    }

    // 核心功能：讀取資料與統計
    async function refreshApp() {
        const client = getClient();
        if (!client) {
            setTimeout(refreshApp, 500);
            return;
        }

        try {
            // 1. 抓取全部紀錄顯示在清單
            const { data: allData, error: err1 } = await client.from('expenses').select('*').order('created_at', { ascending: false });
            if (err1) throw err1;

            const listDiv = document.getElementById('list');
            listDiv.innerHTML = allData.length === 0 ? "目前沒有紀錄。" : allData.map(item => `
                <div class="record-item">
                    <div>
                        <span class="tag ${item.payer === '小精靈' ? 'tag-elf' : 'tag-water'}">${item.payer}</span>
                        <span class="tag ${item.need_type === '必要花費' ? 'tag-need' : 'tag-want'}">${item.need_type}</span>
                        <b>${item.title}</b>
                        <small style="color:#999">${item.category} | ${new Date(item.created_at).toLocaleDateString()}</small>
                    </div>
                    <div style="font-weight:bold; color:#cb457e;">$${item.amount}</div>
                </div>
            `).join('');

            // 2. 統計數據
            const { startThis, startLast, endLast } = getDateRanges();
            const { data: thisMonthData } = await client.from('expenses').select('payer, amount').gte('created_at', startThis);
            const { data: lastMonthData } = await client.from('expenses').select('payer, amount').gte('created_at', startLast).lte('created_at', endLast);

            const calc = (data) => {
                let res = { "小精靈": 0, "西瓜": 0 };
                (data || []).forEach(i => { if(res[i.payer]!==undefined) res[i.payer]+=i.amount; });
                return res;
            };

            const thisT = calc(thisMonthData);
            const lastT = calc(lastMonthData);

            let winner = "👑 上月省錢王：";
            if (lastT["小精靈"] < lastT["西瓜"]) winner += "小精靈";
            else if (lastT["西瓜"] < lastT["小精靈"]) winner += "西瓜";
            else winner = "🤝 上月平手！";

            document.getElementById('stats-board').innerHTML = `
                <h4 style="margin:0 0 10px 0; color:#df4d8f;">📅 本月累計</h4>
                <div style="display:flex; justify-content: space-around; font-size:15px; margin-bottom:8px;">
                    <span>🧚 小精靈: <b>$${thisT["小精靈"]}</b></span>
                    <span>🍉 西瓜: <b>$${thisT["西瓜"]}</b></span>
                </div>
                <div style="font-size:12px; color:#888; border-top:1px solid #ffdae9; padding-top:8px;">${winner}</div>
            `;

        } catch (e) {
            console.error(e);
        }
    }
    
    async function loadData() {
        const listDiv = document.getElementById('list');
        const supabase = getClient();

        if (!supabase) {
            console.log("等待 SDK 載入...");
            setTimeout(loadData, 300); // 0.3秒後重試
            return;
        }

        try {
            const { data, error } = await supabase.from('expenses').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            
            if (!data || data.length === 0) {
                listDiv.innerHTML = "目前沒資料。";
                return;
            }

            listDiv.innerHTML = data.map(item => `
                <div class="record-item">
                    <div>
                        <span class="tag ${item.payer === '小精靈' ? 'tag-elf' : 'tag-water'}">${item.payer}</span>
                        <b>${item.title}</b><br>
                        <small style="color:#999">${item.category} | ${item.need_type}</small>
                    </div>
                    <div style="font-weight:bold; color:#cb457e;">$${item.amount}</div>
                </div>
            `).join('');
        } catch (e) {
            listDiv.innerHTML = "讀取失敗: " + e.message;
        }
    }

    document.getElementById('addBtn').onclick = async () => {
        const supabase = getClient();
        if (!supabase) return alert("系統連線中，請稍候");

        const t = document.getElementById('title').value;
        const a = document.getElementById('amount').value;
        if (!t || !a) return alert("請填寫內容");
        // 關鍵：在這裡呼叫，讓畫面上的數字立刻變動！
        refreshApp();

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "儲存中...";

        const { error } = await supabase.from('expenses').insert([{
            title: t,
            amount: Number(a),
            payer: document.getElementById('payer').value,
            category: document.getElementById('category').value,
            need_type: document.getElementById('need_type').value
        }]);

        if (error) alert("錯誤: " + error.message);
        else {
            document.getElementById('title').value = "";
            document.getElementById('amount').value = "";
            loadData();
        }
        btn.disabled = false;
        btn.innerText = "確認新增";
    };

    // 啟動
    window.onload = loadData;
</script>
</body>
</html>
