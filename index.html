<div class="container">
    <div class="card">
        <h2>💕 新增支出</h2>
        <label>誰付錢</label>
        <select id="payer">
            <option value="小精靈">小精靈</option>
            <option value="西瓜">西瓜</option>
        </select>

        <input id="title" placeholder="項目名稱">
        <input id="amount" type="number" inputmode="decimal" placeholder="金額">

        <label>分類</label>
        <select id="category">
            <option value="餐飲">🍔 餐飲</option>
            <option value="交通">🚗 交通</option>
            <option value="購物">🛍️ 購物</option>
            <option value="醫療">🏥 醫療</option>
            <option value="儲值">💰 儲值</option>
            <option value="罰款">🚔 罰款</option>
            <option value="狗勾">🐶 狗勾</option>
            <option value="其他">✨ 其他</option>
        </select>

        <label>類型</label>
        <select id="need_type">
            <option value="必要花費">⚠️ 必要花費</option>
            <option value="想要花費">🎁 想要花費</option>
        </select>

        <button id="addBtn">確認新增</button>
    </div>

    <div class="card" id="stats-board">
        <p style="color: #999;">正在計算本月數據...</p>
    </div>

    <div class="card">
        <h3>📊 支出紀錄清單</h3>
        <div id="list">正在載入紀錄...</div>
    </div>
</div>
