<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💕 小精靈 & 西瓜 記帳本本 💕</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* 全畫面愛心飄飄背景 */
        body {
            margin: 0; padding: 15px;
            background: linear-gradient(180deg, #ffe3ef 0%, #ffd1e3 100%);
            min-height: 100vh;
            font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            color: #6d2942;
            overflow-x: hidden;
        }

        #heart-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }

        .heart {
            position: absolute; bottom: -50px;
            color: rgba(255, 105, 180, 0.4);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* 介面容器 */
        .container { max-width: 450px; margin: auto; position: relative; z-index: 1; }
        .card { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            border-radius: 25px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2, h3 { margin: 0 0 15px 0; color: #df4d8f; font-size: 20px; text-align: center; letter-spacing: 1px; }
        
        /* 徹底解決日期與所有輸入框跑版 */
        .input-group {
            display: flex; flex-direction: column; /* 垂直排列 */
            width: 100%; margin-top: 15px;
        }
        
        label { 
            font-size: 13px; font-weight: bold; color: #a35d78; 
            margin-bottom: 6px; margin-left: 5px;
        }

        input, select { 
            width: 100% !important; height: 50px; border-radius: 15px;
            border: 2px solid #f9c5d1; font-size: 16px; outline: none;
            background: rgba(255, 255, 255, 0.9); padding: 0 15px !important;
            box-sizing: border-box !important; color: #6d2942;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #ff6fa9; }

        .row { display: flex; gap: 12px; width: 100%; }
        .row > .input-group { flex: 1; }

        .checkbox-row { 
            display: flex; align-items: center; background: rgba(255, 242, 248, 0.7); 
            padding: 15px; border-radius: 15px; margin-top: 20px; 
            border: 2px dashed #f3a9c6; cursor: pointer;
        }
        .checkbox-row input[type="checkbox"] { 
            width: 24px !important; height: 24px !important; margin: 0 12px 0 0 !important; 
        }

        .total-amount { font-size: 36px; font-weight: bold; color: #ff6fa9; text-align: center; margin: 10px 0; text-shadow: 1px 1px 0 white; }
        
        button { 
            width: 100%; padding: 16px; border: none; border-radius: 18px;
            background: linear-gradient(135deg, #ff6fa9 0%, #df4d8f 100%);
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
            margin-top: 25px; box-shadow: 0 4px 15px rgba(223, 77, 143, 0.3);
            transition: 0.2s;
        }
        button:active { transform: scale(0.98); }

        /* 歷史清單 */
        .record-item { 
            background: white; border-radius: 18px; padding: 15px; margin-top: 12px;
            border-left: 8px solid #ff97be; display: flex; justify-content: space-between; align-items: center;
        }
        .tag { padding: 3px 10px; border-radius: 10px; font-size: 11px; color: white; font-weight: bold; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<div id="heart-container"></div>

<div class="container">
    <div class="card">
        <h3>📅 歷史統計</h3>
        <div class="input-group">
            <label>檢視月份</label>
            <input type="month" id="view-month">
        </div>
        <div id="stats-board">載入中...</div>
    </div>

    <div class="card">
        <h2>💕 新增紀錄</h2>
        
        <div class="input-group">
            <label>消費日期</label>
            <input id="custom-date" type="date">
        </div>
        
        <div class="input-group">
            <label>誰付錢</label>
            <select id="payer">
                <option value="小精靈">🧚 小精靈</option>
                <option value="西瓜">🍉 西瓜</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>項目名稱</label>
            <input id="title" type="text" placeholder="去哪裡玩？買了什麼？">
        </div>

        <div class="input-group">
            <label>金額 (退款請打負號 - )</label>
            <input id="amount" type="text" inputmode="hyphenated-decimal" placeholder="0">
        </div>

        <div class="row">
            <div class="input-group">
                <label>分類</label>
                <select id="category">
                    <option value="餐飲">🍔 餐飲</option><option value="餐費預付">💰 餐費預付</option><option value="住宿">🏨 住宿</option>
                    <option value="交通">🚗 交通</option><option value="購物">🛍️ 購物</option><option value="電話及會員">📱 電話及會員</option>
                    <option value="醫療">🏥 醫療</option><option value="儲值">💵 儲值</option><option value="罰款">🚔 罰款</option>
                    <option value="狗勾">🐶 狗勾</option><option value="爸爸贊助">🎁 爸爸贊助</option><option value="其他">✨ 其他</option>
                </select>
            </div>
            <div class="input-group">
                <label>類型</label>
                <select id="need_type">
                    <option value="需要">✅ 需要</option>
                    <option value="想要">🎁 想要</option>
                </select>
            </div>
        </div>

        <div class="checkbox-row" onclick="document.getElementById('is_reimburse').click();">
            <input type="checkbox" id="is_reimburse" onclick="event.stopPropagation();">
            <span style="font-weight:bold; color:#df4d8f;">這筆是「待請款」</span>
        </div>

        <button id="addBtn" onclick="handleAddRecord()">✨ 存入本本 ✨</button>
    </div>

    <div class="card">
        <h3>📜 歷史明細</h3>
        <div class="row" style="margin-bottom: 10px;">
            <select id="filter-payer" style="height:40px; font-size:13px;"><option value="全部">👤 全部</option><option value="小精靈">🧚 小精靈</option><option value="西瓜">🍉 西瓜</option></select>
            <select id="filter-category" style="height:40px; font-size:13px;">
                <option value="全部">📂 全部</option><option value="待請款">💸 待請款</option>
                <option value="餐飲">🍔 餐飲</option><option value="餐費預付">💰 餐費預付</option><option value="住宿">🏨 住宿</option>
                <option value="交通">🚗 交通</option><option value="購物">🛍️ 購物</option><option value="電話及會員">📱 電話及會員</option>
                <option value="醫療">🏥 醫療</option><option value="儲值">💵 儲值</option><option value="罰款">🚔 罰款</option>
                <option value="狗勾">🐶 狗勾</option><option value="爸爸贊助">🎁 爸爸贊助</option><option value="其他">✨ 其他</option>
            </select>
        </div>
        <div id="record-list"></div>
    </div>
</div>

<script>
    // 背景愛心生成邏輯
    function initHearts() {
        const container = document.getElementById('heart-container');
        const heartIcons = ['❤', '💗', '💓', '💕', '💖'];
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.duration = (Math.random() * 5 + 5) + 's';
            heart.style.animationDuration = heart.style.duration;
            container.appendChild(heart);
            setTimeout(() => heart.remove(), parseFloat(heart.style.duration) * 1000);
        }, 600);
    }
    initHearts();

    const SB_URL = "https://dfflacypaegfmgstwzeb.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZmxhY3lwYWVnZm1nc3R3emViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mzk3NjksImV4cCI6MjA5NDExNTc2OX0.RsC760Xyq1bTN6zq9Itm3rDoRLqbVgglj6EegkA5gmQ";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxi8QHWjSitWQJUVTLntehHUYbm-QwyNp6c296bvCDxJIoc_k-Pq-Cu8R21JAiJx26n/exec";
    const db = window.supabase.createClient(SB_URL, SB_KEY);
    let localData = [];

    // 金額輸入過濾
    document.getElementById('amount').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9.-]/g, '');
    });

    async function handleAddRecord() {
        const btn = document.getElementById('addBtn');
        const amountStr = document.getElementById('amount').value;
        if (!amountStr || btn.disabled) return alert("金額還沒填喔！💸");
        
        btn.disabled = true;
        btn.innerText = "寫入中...";

        try {
            const amount = parseFloat(amountStr);
            const title = document.getElementById('title').value || "未命名";
            const payer = document.getElementById('payer').value;
            const category = document.getElementById('category').value;
            const needType = document.getElementById('need_type').value;
            const isReimburse = document.getElementById('is_reimburse').checked;
            const customDate = document.getElementById('custom-date').value;
            const finalDate = `${customDate}T${new Date().toTimeString().split(' ')[0]}.000Z`;

            const { error } = await db.from('expenses').insert([{
                title, amount, payer, category, 
                need_type: needType, is_reimburse: isReimburse, is_settled: false, created_at: finalDate
            }]);

            if (error) throw error;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // LINE 通知
            let msg = `\n🔔 新紀錄！\n項目：${title}\n金額：$${amount}\n付款人：${payer}\n分類：${category} (${needType})`;
            if (isReimburse) msg += `\n⚠️ 【這是待請款】`;
            if (category === "罰款") msg += `\n👊 揍你喔！看你下次還敢不敢！`;

            if (isReimburse || category === "罰款") {
                fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ message: msg }) });
            }

            alert(category === "罰款" ? "👊 已記錄，揍你喔！" : "✅ 存好囉！");
            document.getElementById('amount').value = "";
            document.getElementById('title').value = "";
            document.getElementById('is_reimburse').checked = false;
            await refresh();
        } catch (err) { alert("出錯了：" + err.message); }
        finally { btn.disabled = false; btn.innerText = "✨ 存入本本 ✨"; }
    }

    async function refresh() {
        const monthVal = document.getElementById('view-month').value;
        const [year, month] = monthVal.split('-').map(Number);
        const { data } = await db.from('expenses').select('*').order('created_at', { ascending: false });
        localData = data || [];

        let s = { elf: 0, water: 0, total: 0, elf_r: 0, water_r: 0, elfList: [], waterList: [] };
        localData.forEach(i => {
            const d = new Date(i.created_at);
            const amt = Number(i.amount);
            if (d.getFullYear() === year && (d.getMonth() + 1) === month) {
                if (i.payer.trim() === "小精靈") s.elf += amt; else s.water += amt;
                s.total += amt;
            }
            if (i.is_reimburse && !i.is_settled) {
                if (i.payer.trim() === "小精靈") { s.elf_r += amt; s.elfList.push(i); }
                else { s.water_r += amt; s.waterList.push(i); }
            }
        });

        const toTxt = (list) => list.length ? list.map(i => `· ${i.title}($${i.amount})`).join('<br>') : '無';
        document.getElementById('stats-board').innerHTML = `
            <div class="total-amount">$${Math.round(s.total)}</div>
            <div style="display:flex; justify-content: space-around; font-size:13px; color:#888;">
                <span>🧚 小精靈: $${Math.round(s.elf)}</span><span>🍉 西瓜: $${Math.round(s.water)}</span>
            </div>
            <div class="reimburse-box">
                <div style="display:flex; justify-content: space-between; gap:10px;">
                    <div style="flex:1;"><b>🧚 待領</b><br><span style="font-size:18px; color:#ff6fa9;">$${Math.round(s.elf_r)}</span><div class="reimburse-list">${toTxt(s.elfList)}</div></div>
                    <div style="flex:1;"><b>🍉 待領</b><br><span style="font-size:18px; color:#4da6ff;">$${Math.round(s.water_r)}</span><div class="reimburse-list">${toTxt(s.waterList)}</div></div>
                </div>
                <button style="font-size:14px; padding:10px; margin-top:12px; height:auto; background:#6c5ce7;" onclick="settleAll()">💰 結清並反轉身分</button>
            </div>
        `;
        renderList();
    }

    function renderList() {
        const pFilter = document.getElementById('filter-payer').value;
        const cFilter = document.getElementById('filter-category').value;
        const [year, month] = document.getElementById('view-month').value.split('-').map(Number);
        const filtered = localData.filter(i => {
            const d = new Date(i.created_at);
            const mMatch = d.getFullYear() === year && (d.getMonth() + 1) === month;
            const pMatch = (pFilter === "全部" || i.payer.trim() === pFilter);
            const cMatch = (cFilter === "全部") ? true : (cFilter === "待請款" ? i.is_reimburse : i.category === cFilter);
            return mMatch && pMatch && cMatch;
        });
        document.getElementById('record-list').innerHTML = filtered.map(i => `
            <div class="record-item" style="${i.is_settled ? 'opacity:0.5' : ''}">
                <div style="flex:1;">
                    <span class="tag" style="background:${i.payer.trim() === '小精靈' ? '#ff6fa9' : '#4da6ff'}">${i.payer}</span>
                    <span class="tag" style="background:#a35d78">${i.need_type || '需要'}</span>
                    <div style="font-weight:bold; font-size:15px;">${i.title}</div>
                    <div style="font-size:11px; color:#999;">${i.category} | ${new Date(i.created_at).toLocaleDateString()}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:bold; color:${i.amount < 0 ? '#27ae60' : '#cb457e'}">$${Math.round(i.amount)}</div>
                    ${i.is_reimburse ? `<span style="font-size:10px; color:#6c5ce7; border:1px solid #6c5ce7; padding:1px 4px; border-radius:4px;">${i.is_settled ? '已結' : '待請'}</span>` : ''}
                </div>
            </div>`).join('');
    }

    async function settleAll() {
        if (!confirm("確定要結清所有待請款嗎？")) return;
        const { data: targets } = await db.from('expenses').select('*').eq('is_reimburse', true).eq('is_settled', false);
        if (!targets || targets.length === 0) return alert("沒東西可以結清喔！");
        for (const item of targets) {
            const nextPayer = (item.payer.trim() === "小精靈") ? "西瓜" : "小精靈";
            await db.from('expenses').update({ payer: nextPayer, is_settled: true, title: `(結清) ${item.title}` }).eq('id', item.id);
        }
        alert("結清成功！辛苦了 💕"); await refresh();
    }

    window.onload = () => {
        const d = new Date();
        document.getElementById('view-month').value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('custom-date').value = d.toISOString().split('T')[0];
        document.getElementById('view-month').onchange = refresh;
        document.getElementById('filter-payer').onchange = renderList;
        document.getElementById('filter-category').onchange = renderList;
        refresh();
    };
</script>
</body>
</html>
