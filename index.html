<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 小精靈 & 西瓜 記帳本 💕</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #ffe3ef; padding: 15px; color: #6d2942; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        h2, h3 { margin: 0 0 15px 0; color: #df4d8f; font-size: 20px; }
        label { display: block; text-align: left; margin-top: 12px; font-size: 14px; font-weight: bold; color: #a35d78; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 12px; border: 1px solid #f3a9c6; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 15px; background: #ff6fa9; color: white; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #ccc; }
        
        /* 1. 本月看板樣式 (置頂) */
        #stats-board { background: #fff; border: 2px dashed #ff97be; border-radius: 20px; padding: 15px; margin-top: 10px; }
        .total-amount { font-size: 36px; font-weight: bold; color: #ff6fa9; margin: 5px 0; }
        .sub-stats { display: flex; justify-content: space-around; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .winner-tag { font-size: 13px; color: #888; margin-top: 12px; background: #fff2f8; padding: 8px; border-radius: 12px; font-weight: bold; }

        /* 2. 歷史紀錄樣式 */
        .record-item { background: #fff2f8; border-radius: 15px; padding: 15px; margin-top: 12px; border-left: 6px solid #ff97be; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .record-info b { font-size: 17px; display: block; margin: 3px 0; color: #444; }
        .record-info small { color: #999; font-size: 12px; }
        .amount-text { font-size: 18px; font-weight: bold; color: #cb457e; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin-right: 4px; color: white; font-weight: bold; }
        .tag-need { background: #ff97be; }
        .tag-want { background: #ffcb97; }
        .tag-elf { background: #ff6fa9; }
        .tag-water { background: #4da6ff; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card" id="stats-board">
        <p>📊 正在同步最新數據...</p>
    </div>

    <div class="card">
        <h2>💕 小精靈 & 西瓜 記帳本 💕</h2>
        <label>誰付錢</label>
        <select id="payer">
            <option value="小精靈">小精靈</option>
            <option value="西瓜">西瓜</option>
        </select>
        <label>項目名稱</label>
        <input id="title" type="text" placeholder="買了什麼好東西？">
        <label>金額</label>
        <input id="amount" type="number" inputmode="decimal" placeholder="0">
        <label>分類</label>
        <select id="category">
            <option value="餐飲">🍔 餐飲</option>
            <option value="交通">🚗 交通</option>
            <option value="購物">🛍️ 購物</option>
            <option value="醫療">🏥 醫療</option>
            <option value="儲值">💰 儲值</option>
            <option value="罰款">🚔 罰款</option>
            <option value="狗勾">🐶 狗勾</option>
            <option value="其他">✨ 其他</option>
        </select>
        <label>類型</label>
        <select id="need_type">
            <option value="必要花費">⚠️ 必要花費</option>
            <option value="想要花費">🎁 想要花費</option>
        </select>
        <button id="addBtn">確認新增紀錄</button>
    </div>

    <div class="card">
        <h3>📜 支出紀錄清單</h3>
        <div id="list-status" style="font-size: 14px; color: #999;">連線中...</div>
        <div id="record-list"></div>
    </div>
</div>

<script>
    const SB_URL = "https://dfflacypaegfmgstwzeb.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZmxhY3lwYWVnZm1nc3R3emViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mzk3NjksImV4cCI6MjA5NDExNTc2OX0.RsC760Xyq1bTN6zq9Itm3rDoRLqbVgglj6EegkA5gmQ";
    
    let client = null;

    function initClient() {
        if (client) return client;
        if (window.supabase && window.supabase.createClient) {
            client = window.supabase.createClient(SB_URL, SB_KEY);
            return client;
        }
        return null;
    }

    function getMonthDates() {
        const now = new Date();
        const startThis = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
        const startLast = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();
        const endLast = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59).toISOString();
        return { startThis, startLast, endLast };
    }

    async function updateUI() {
        const supabase = initClient();
        if (!supabase) {
            setTimeout(updateUI, 500);
            return;
        }

        try {
            const { startThis, startLast, endLast } = getMonthDates();

            const [thisRes, lastRes, allRes] = await Promise.all([
                supabase.from('expenses').select('payer, amount').gte('created_at', startThis),
                supabase.from('expenses').select('payer, amount').gte('created_at', startLast).lte('created_at', endLast),
                supabase.from('expenses').select('*').order('created_at', { ascending: false })
            ]);

            const calc = (data) => {
                let res = { "小精靈": 0, "西瓜": 0, "total": 0 };
                (data || []).forEach(item => {
                    const name = item.payer.trim();
                    const amt = Number(item.amount);
                    if (res[name] !== undefined) res[name] += amt;
                    res.total += amt;
                });
                return res;
            };

            const thisT = calc(thisRes.data);
            const lastT = calc(lastRes.data);

            // 更新看板 (含前月冠軍)
            let winner = "👑 上月省錢王：尚未結算";
            if (lastRes.data && lastRes.data.length > 0) {
                if (lastT["小精靈"] < lastT["西瓜"]) winner = "👑 上月省錢王：小精靈 (省很大！)";
                else if (lastT["西瓜"] < lastT["小精靈"]) winner = "👑 上月省錢王：西瓜 (省錢高手！)";
                else winner = "🤝 上月平手！兩個人都好棒";
            }

            document.getElementById('stats-board').innerHTML = `
                <h4 style="margin:0; color:#df4d8f;">📅 本月消費看板</h4>
                <div style="font-size: 12px; color: #999; margin-top:10px;">本月累積總支出</div>
                <div class="total-amount">$${thisT.total}</div>
                <div class="sub-stats">
                    <div><div style="color:#ff6fa9; font-size:12px;">🧚 小精靈</div><b>$${thisT["小精靈"]}</b></div>
                    <div style="width:1px; background:#eee;"></div>
                    <div><div style="color:#4da6ff; font-size:12px;">🍉 西瓜</div><b>$${thisT["西瓜"]}</b></div>
                </div>
                <div class="winner-tag">${winner}</div>
            `;

            // 更新清單
            document.getElementById('list-status').style.display = "none";
            const listDiv = document.getElementById('record-list');
            listDiv.innerHTML = (allRes.data || []).map(item => `
                <div class="record-item">
                    <div class="record-info">
                        <div>
                            <span class="tag ${item.payer === '小精靈' ? 'tag-elf' : 'tag-water'}">${item.payer}</span>
                            <span class="tag ${item.need_type === '必要花費' ? 'tag-need' : 'tag-want'}">${item.need_type}</span>
                        </div>
                        <b>${item.title}</b>
                        <small>${item.category} | ${new Date(item.created_at).toLocaleDateString()}</small>
                    </div>
                    <div class="amount-text">$${item.amount}</div>
                </div>
            `).join('');

        } catch (err) {
            document.getElementById('list-status').innerText = "連線失敗，請檢查 RLS 或網路";
        }
    }

    document.getElementById('addBtn').onclick = async () => {
        const supabase = initClient();
        const t = document.getElementById('title').value;
        const a = document.getElementById('amount').value;
        if (!t || !a || !supabase) return alert("要填寫項目和金額喔！");

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "紀錄中...";

        const { error } = await supabase.from('expenses').insert([{
            title: t,
            amount: Number(a),
            payer: document.getElementById('payer').value,
            category: document.getElementById('category').value,
            need_type: document.getElementById('need_type').value
        }]);

        if (error) {
            alert("失敗了：" + error.message);
        } else {
            document.getElementById('title').value = "";
            document.getElementById('amount').value = "";
            updateUI(); 
        }
        btn.disabled = false;
        btn.innerText = "確認新增紀錄";
    };

    window.onload = updateUI;
</script>
</body>
</html>
