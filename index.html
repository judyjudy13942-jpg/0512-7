<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 小精靈 & 西瓜 記帳本 💕</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #ffe3ef; padding: 20px; text-align: center; color: #6d2942; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff6fa9; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .record { text-align: left; background: #fff2f8; padding: 10px; margin-top: 10px; border-radius: 10px; border-left: 5px solid #ff6fa9; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💕 記帳本 💕</h2>
        <select id="payer"><option value="小精靈">小精靈</option><option value="西瓜">西瓜</option></select>
        <input id="title" placeholder="項目">
        <input id="amount" type="number" placeholder="金額">
        <button id="addBtn">確認新增</button>
        <hr>
        <h3>支出紀錄</h3>
        <div id="list">正在同步資料庫...</div>
    </div>

<script>
    // --- 這裡開始是唯一的 Script 區塊，請確保整份檔案只有這一個 <script> ---
    const SB_URL = "https://dfflacypaegfmgstwzeb.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZmxhY3lwYWVnZm1nc3R3emViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mzk3NjksImV4cCI6MjA5NDExNTc2OX0.RsC760Xyq1bTN6zq9Itm3rDoRLqbVgglj6EegkA5gmQ";
    
    // 只定義一次！
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    async function loadData() {
        const { data, error } = await supabase.from('expenses').select('*').order('created_at', { ascending: false });
        if (error) {
            document.getElementById('list').innerText = "讀取失敗：" + error.message;
            return;
        }
        const listDiv = document.getElementById('list');
        if (!data || data.length === 0) {
            listDiv.innerHTML = "目前沒有紀錄。";
        } else {
            listDiv.innerHTML = data.map(item => `
                <div class="record">
                    <span><b>${item.title}</b> (${item.payer})</span>
                    <span>$${item.amount}</span>
                </div>
            `).join('');
        }
    }

    document.getElementById('addBtn').onclick = async () => {
        const t = document.getElementById('title').value;
        const a = document.getElementById('amount').value;
        if(!t || !a) return alert("要填寫喔！");

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "儲存中...";

        const { error } = await supabase.from('expenses').insert([{
            title: t,
            amount: Number(a),
            payer: document.getElementById('payer').value,
            category: "其他",
            need_type: "必要"
        }]);

        if (error) alert("錯誤：" + error.message);
        else {
            alert("✨ 新增成功！");
            document.getElementById('title').value = "";
            document.getElementById('amount').value = "";
            loadData();
        }
        btn.disabled = false;
        btn.innerText = "確認新增";
    };

    loadData();
</script>
</body>
</html>
