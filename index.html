<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💕 小精靈 & 西瓜 記帳本本 💕</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box !important; }
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; background: #ffe3ef; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; padding: 15px; color: #6d2942; }
        .container { max-width: 450px; margin: auto; width: 100%; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); width: 100%; }
        h2, h3 { margin: 0 0 12px 0; color: #df4d8f; font-size: 19px; text-align: center; }
        label { display: block; text-align: left; margin-top: 10px; font-size: 13px; font-weight: bold; color: #a35d78; }
        input, select { width: 100% !important; height: 46px; padding: 8px 12px !important; margin-top: 4px; border-radius: 12px; border: 1px solid #f3a9c6; font-size: 16px; background-color: white; outline: none; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        .checkbox-row { display: flex; align-items: center; background: #fff2f8; padding: 12px 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #f3a9c6; cursor: pointer; }
        .checkbox-row input[type="checkbox"] { width: 22px !important; height: 22px !important; margin: 0 10px 0 0 !important; appearance: checkbox !important; -webkit-appearance: checkbox !important; }
        button { width: 100%; padding: 15px; border: none; border-radius: 15px; background: #ff6fa9; color: white; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .record-item { background: #fff2f8; border-radius: 15px; padding: 12px; margin-top: 10px; border-left: 6px solid #ff97be; display: flex; justify-content: space-between; align-items: center; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>📅 歷史統計</h3>
        <input type="month" id="view-month">
        <div id="stats-board">讀取中...</div>
    </div>

    <div class="card">
        <h2>💕 新增紀錄</h2>
        <label>日期</label>
        <input id="custom-date" type="date">
        <label>誰付錢</label>
        <select id="payer"><option value="小精靈">小精靈</option><option value="西瓜">西瓜</option></select>
        <label>項目名稱</label>
        <input id="title" type="text" placeholder="輸入項目名稱">
        <label>金額</label>
        <input id="amount" type="number" inputmode="decimal" placeholder="0">
        <div class="row">
            <div>
                <label>分類</label>
                <select id="category">
                    <option value="餐飲">🍔 餐飲</option><option value="餐費預付">💰 餐費預付</option>
                    <option value="住宿">🏨 住宿</option><option value="交通">🚗 交通</option>
                    <option value="購物">🛍️ 購物</option><option value="電話及會員">📱 電話及會員</option>
                    <option value="醫療">🏥 醫療</option><option value="儲值">💵 儲值</option>
                    <option value="罰款">🚔 罰款</option><option value="狗勾">🐶 狗勾</option>
                    <option value="其他">✨ 其他</option>
                </select>
            </div>
            <div>
                <label>類型</label>
                <select id="need_type_select">
                    <option value="需要">✅ 需要</option>
                    <option value="想要">🎁 想要</option>
                </select>
            </div>
        </div>
        <div class="checkbox-row" onclick="document.getElementById('is_reimburse').click();">
            <input type="checkbox" id="is_reimburse" onclick="event.stopPropagation();">
            <span>這筆是「待請款」</span>
        </div>
        <button id="addBtn">確認新增</button>
    </div>

    <div id="record-list"></div>
</div>

<script>
    const SB_URL = "https://dfflacypaegfmgstwzeb.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZmxhY3lwYWVnZm1nc3R3emViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mzk3NjksImV4cCI6MjA5NDExNTc2OX0.RsC760Xyq1bTN6zq9Itm3rDoRLqbVgglj6EegkA5gmQ";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwXM4LqC4bKJTCJIWci9tnfZQswhxVJXGETgLcpqDpOOIW5h1iClAVKJ6yp2vm-bfdt/exec";

    const db = window.supabase.createClient(SB_URL, SB_KEY);

    async function refresh() {
        const { data } = await db.from('expenses').select('*').order('created_at', { ascending: false });
        if (!data) return;
        document.getElementById('record-list').innerHTML = data.slice(0,10).map(i => `
            <div class="record-item">
                <div><span class="tag" style="background:#ff6fa9">${i.payer}</span> <b>${i.title}</b></div>
                <div style="color:#cb457e; font-weight:bold;">$${i.amount}</div>
            </div>`).join('');
    }

    document.getElementById('addBtn').onclick = async () => {
        const amt = document.getElementById('amount').value;
        if (!amt) return alert("請輸入金額");

        const payload = {
            title: document.getElementById('title').value || "未命名",
            amount: Number(amt),
            payer: document.getElementById('payer').value,
            category: document.getElementById('category').value,
            need_type: document.getElementById('need_type_select').value, // 這裡要對應資料庫名稱
            is_reimburse: document.getElementById('is_reimburse').checked,
            is_settled: false,
            created_at: document.getElementById('custom-date').value + "T" + new Date().toTimeString().split(' ')[0] + ".000Z"
        };

        console.log("正在發送資料：", payload);

        const { error } = await db.from('expenses').insert([payload]);

        if (error) {
            console.error("Supabase 錯誤詳情：", error);
            alert(`❌ 新增失敗 (400)\n原因：${error.message}\n提示：請確認資料庫欄位名稱是否真的是 need_type (全小寫且無空格)`);
        } else {
            alert("✅ 新增成功！");
            if (payload.category === "罰款") {
                fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ message: `\n👊 揍你喔！\n項目：${payload.title}\n金額：$${payload.amount}` }) });
            }
            location.reload();
        }
    };

    window.onload = () => {
        const d = new Date();
        document.getElementById('view-month').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        document.getElementById('custom-date').value = d.toISOString().split('T')[0];
        refresh();
    };
</script>
</body>
</html>
