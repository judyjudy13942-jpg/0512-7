<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 小精靈 & 西瓜 記帳本 💕</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #ffe3ef; padding: 15px; color: #6d2942; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        h2, h3 { margin: 0 0 15px 0; color: #df4d8f; font-size: 20px; }
        label { display: block; text-align: left; margin-top: 12px; font-size: 14px; font-weight: bold; color: #a35d78; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 12px; border: 1px solid #f3a9c6; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 15px; background: #ff6fa9; color: white; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
        
        /* 結清按鈕樣式 */
        .settle-btn { background: #6c5ce7; font-size: 14px; padding: 8px; margin-top: 10px; border-radius: 10px; width: auto; min-width: 120px; }
        
        /* 勾選欄位樣式 */
        .checkbox-container { display: flex; align-items: center; background: #fff2f8; padding: 10px; border-radius: 12px; margin-top: 15px; border: 1px solid #f3a9c6; cursor: pointer; }
        .checkbox-container input { width: 20px; height: 20px; margin: 0 10px 0 0; }

        /* 看板樣式 */
        #stats-board { background: #fff; border: 2px dashed #ff97be; border-radius: 20px; padding: 15px; }
        .total-amount { font-size: 32px; font-weight: bold; color: #ff6fa9; margin: 5px 0; }
        .reimburse-box { background: #fdf2ff; border-radius: 12px; padding: 12px; margin-top: 15px; border: 1px solid #e0c3fc; }
        
        /* 紀錄樣式 */
        .record-item { background: #fff2f8; border-radius: 15px; padding: 15px; margin-top: 12px; border-left: 6px solid #ff97be; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin-right: 4px; color: white; font-weight: bold; }
        .tag-settled { background: #b2bec3; } /* 已結清標籤灰色 */
        .tag-reimburse { background: #6c5ce7; }
        .amount-text { font-size: 18px; font-weight: bold; color: #cb457e; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="stats-board">
        <p>📊 數據載入中...</p>
    </div>

    <div class="card">
        <h2>💕 新增支出</h2>
        <label>誰付錢</label>
        <select id="payer"><option value="小精靈">小精靈</option><option value="西瓜">西瓜</option></select>
        <input id="title" type="text" placeholder="項目名稱">
        <input id="amount" type="number" step="any" placeholder="金額">
        
        <label>分類</label>
        <select id="category">
            <option value="餐飲">🍔 餐飲</option><option value="交通">🚗 交通</option><option value="購物">🛍️ 購物</option>
            <option value="醫療">🏥 醫療</option><option value="儲值">💰 儲值</option><option value="罰款">🚔 罰款</option>
            <option value="狗勾">🐶 狗勾</option><option value="其他">✨ 其他</option>
        </select>

        <label class="checkbox-container">
            <input type="checkbox" id="is_reimburse">
            <span style="font-size:14px; font-weight:bold; color:#df4d8f;">🙋 這是「待請款」</span>
        </label>

        <label>類型</label>
        <select id="need_type"><option value="必要花費">⚠️ 必要花費</option><option value="想要花費">🎁 想要花費</option></select>
        <button id="addBtn">確認新增</button>
    </div>

    <div class="card">
        <h3>📜 歷史紀錄</h3>
        <div id="record-list"></div>
    </div>
</div>

<script>
    const SB_URL = "https://dfflacypaegfmgstwzeb.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZmxhY3lwYWVnZm1nc3R3emViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mzk3NjksImV4cCI6MjA5NDExNTc2OX0.RsC760Xyq1bTN6zq9Itm3rDoRLqbVgglj6EegkA5gmQ";
    
    let client = null;
    function getDb() {
        if (!client && window.supabase) client = window.supabase.createClient(SB_URL, SB_KEY);
        return client;
    }

    async function refresh() {
    const db = getDb();
    if (!db) { setTimeout(refresh, 500); return; }

    const now = new Date();
    const startThis = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();

    const { data: allRecords } = await db.from('expenses').select('*').order('created_at', { ascending: false });
    
    // 初始化統計資料
    let stats = { "小精靈": 0, "西瓜": 0, "total": 0, "小精靈待請款": 0, "西瓜待請款": 0 };

    (allRecords || []).forEach(i => {
        const amt = Number(i.amount);
        const payer = i.payer.trim();
        const isThisMonth = new Date(i.created_at) >= new Date(startThis);

        if (isThisMonth) {
            // 【重要更動】：不論是不是待請款，只要是本月支出，通通計入「實質總支出」與「個人支出」
            if (stats[payer] !== undefined) stats[payer] += amt;
            stats.total += amt;
        }

        // 待請款看板邏輯：依然只統計「尚未結清」的代墊款
        if (i.is_reimburse && !i.is_settled) {
            if (payer === "小精靈") stats["小精靈待請款"] += amt;
            else if (payer === "西瓜") stats["西瓜待請款"] += amt;
        }
    });

    // 更新看板 UI (與之前相同，但數值邏輯已變)
    document.getElementById('stats-board').innerHTML = `
        <h4 style="margin:0; color:#df4d8f;">📅 本月實質總支出</h4>
        <div class="total-amount">$${stats.total}</div>
        
        <div style="display:flex; justify-content: space-around; font-size:13px; color:#888; margin-bottom:10px;">
            <span>🧚 個人: $${stats["小精靈"]}</span>
            <span>🍉 個人: $${stats["西瓜"]}</span>
        </div>

        <div class="reimburse-box">
            <div style="display:flex; justify-content: space-around; margin-bottom:10px;">
                <div><div style="color:#6c5ce7; font-size:12px; font-weight:bold;">🧚 小精靈待請款</div><div style="font-size:20px; font-weight:bold;">$${stats["小精靈待請款"]}</div></div>
                <div style="width:1px; background:#e0c3fc;"></div>
                <div><div style="color:#6c5ce7; font-size:12px; font-weight:bold;">🍉 西瓜待請款</div><div style="font-size:20px; font-weight:bold;">$${stats["西瓜待請款"]}</div></div>
            </div>
            <button class="settle-btn" onclick="settleAll()">💰 結清目前的待請款</button>
        </div>
    `;

    // ... 清單顯示部分保持不變 ...
}
        // 更新看板
        document.getElementById('stats-board').innerHTML = `
            <h4 style="margin:0; color:#df4d8f;">📅 本月實質總支出</h4>
            <div class="total-amount">$${stats.total}</div>
            
            <div class="reimburse-box">
                <div style="display:flex; justify-content: space-around; margin-bottom:10px;">
                    <div><div style="color:#6c5ce7; font-size:12px; font-weight:bold;">🧚 小精靈待請款</div><div style="font-size:20px; font-weight:bold;">$${stats["小精靈待請款"]}</div></div>
                    <div style="width:1px; background:#e0c3fc;"></div>
                    <div><div style="color:#6c5ce7; font-size:12px; font-weight:bold;">🍉 西瓜待請款</div><div style="font-size:20px; font-weight:bold;">$${stats["西瓜待請款"]}</div></div>
                </div>
                <button class="settle-btn" onclick="settleAll()">💰 按此結清所有待請款</button>
            </div>
        `;

        // 更新清單
        document.getElementById('record-list').innerHTML = (allRecords || []).map(item => `
            <div class="record-item" style="${item.is_settled ? 'opacity: 0.6;' : ''}">
                <div>
                    <span class="tag ${item.payer === '小精靈' ? 'tag-elf' : 'tag-water'}" style="background:${item.payer === '小精靈'?'#ff6fa9':'#4da6ff'}">${item.payer}</span>
                    ${item.is_reimburse ? `<span class="tag ${item.is_settled ? 'tag-settled' : 'tag-reimburse'}">${item.is_settled ? '✅ 已結清' : '💸 待請款'}</span>` : ''}
                    <b>${item.title}</b>
                    <small style="display:block; color:#999;">${item.category} | ${new Date(item.created_at).toLocaleDateString()}</small>
                </div>
                <div class="amount-text">$${item.amount}</div>
            </div>
        `).join('');
    }

    // 結清按鈕功能
    async function settleAll() {
        if (!confirm("確定雙方都已經拿好錢，要結清目前的待請款嗎？")) return;
        const db = getDb();
        const { error } = await db.from('expenses')
            .update({ is_settled: true })
            .eq('is_reimburse', true)
            .eq('is_settled', false);
        
        if (error) alert("結清失敗：" + error.message);
        else {
            alert("✨ 結清完成！看板已歸零。");
            refresh();
        }
    }

    document.getElementById('addBtn').onclick = async () => {
        const db = getDb();
        const t = document.getElementById('title').value;
        const a = document.getElementById('amount').value;
        if (!t || !a) return alert("請填寫完整！");

        await db.from('expenses').insert([{
            title: t, amount: Number(a),
            payer: document.getElementById('payer').value,
            category: document.getElementById('category').value,
            need_type: document.getElementById('need_type').value,
            is_reimburse: document.getElementById('is_reimburse').checked,
            is_settled: false
        }]);

        document.getElementById('title').value = "";
        document.getElementById('amount').value = "";
        document.getElementById('is_reimburse').checked = false;
        refresh();
    };

    window.onload = refresh;
</script>
</body>
</html>
